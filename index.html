<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        /* General Body Styles */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black; /* Change background to black */
            color: white; /* Ensure text is visible on black background */
        }

        /* CAPTCHA Container */
        #captcha-container {
            text-align: center;
            background: black; /* Ensure CAPTCHA container background is black */
            padding: 20px;
            border-radius: 10px;
        }

        /* Hide Main Content Initially */
        #main-content {
            display: none;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: rgb(211, 165, 255);
        }

        /* Calculator Styles */
        #calculator {
            font-family: Arial, sans-serif;
            background-color: rgb(0, 0, 0);
            border-radius: 25px;
            max-width: 500px;
            overflow: hidden;
            border: none;
            padding: 20px;
            text-align: center;
        }

        #display {
            width: 100%;
            padding: 20px;
            font-size: 5rem;
            text-align: right;
            background-color: rgb(9, 9, 9);
            color: white;
            border: none;
            outline: none;
        }

        #keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 10px;
        }

        button {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 50px;
            background-color: hsl(272, 100%, 15%);
            color: hsl(271, 100%, 80%);
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: hsl(272, 100%, 25%);
        }

        button:active {
            background-color: hsl(272, 100%, 35%);
        }

        .operator-btn {
            background-color: hsl(16, 100%, 50%);
        }

        .operator-btn:hover {
            background-color: hsl(16, 100%, 55%);
        }

        .operator-btn:active {
            background-color: hsl(16, 100%, 60%);
        }
    </style>
</head>
<body>
    <!-- CAPTCHA Container -->
    <div id="captcha-container">
        <h2>Please Wait </h2>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAA9b4f66lgPg_lLF" data-callback="captchaSuccess"></div>
    </div>

    <!-- Main Website Content (Initially Hidden) -->
    <div id="main-content">
        <div id="calculator">
            <input id="display" type="text" readonly>
        
            <div id="keys">
                <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('-')" class="operator-btn">-</button>
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('*')" class="operator-btn">*</button>
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('/')" class="operator-btn">/</button>
                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button onclick="calculate()">=</button>
                <button onclick="clearDisplay()" class="operator-btn">C</button>
            </div>
        </div>
    </div>

    <script>
        function captchaSuccess() {
            document.getElementById("captcha-container").style.display = "none";
            document.getElementById("main-content").style.display = "flex";
        }

        const display = document.getElementById("display");

        function appendToDisplay(input) {
            display.value += input;
        }

        function clearDisplay() {
            display.value = "";
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = "error";
            }
        }
    </script>
</body>
</html>
